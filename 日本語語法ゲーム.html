<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>文法勇者の冒険 — 日语语法RPG</title>
<style>
/* ===== CSS Variables ===== */
:root {
  --bg: #f6f1eb;
  --bg2: #faf7f2;
  --text: #2d2418;
  --text2: #6b5d4e;
  --text3: #8c7e6a;
  --border: #d6c9b8;
  --accent: #a68b5b;
  --c1: #7a6f5d;
  --c2: #8b6f47;
  --c3: #5a7a5e;
  --c4: #8a5c3a;
  --c5: #6a5a7a;
  --success: #5a7a5e;
  --danger: #a0522d;
  --warning: #b8860b;
  --card: #faf7f2;
  --hp-fill: #5a7a5e;
  --enemy-hp-fill: #a0522d;
  --radius: 10px;
  --radius-sm: 6px;
  --shadow: 0 2px 12px rgba(45,36,24,.08);
  --transition: .25s cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"] {
  --bg: #141210;
  --bg2: #1c1917;
  --text: #e8ddd0;
  --text2: #a09080;
  --text3: #786858;
  --border: #3a302a;
  --accent: #c49a6c;
  --c1: #9a8f7d;
  --c2: #ab8f67;
  --c3: #7a9a7e;
  --c4: #aa7c5a;
  --c5: #8a7a9a;
  --success: #7a9a7e;
  --danger: #c0622d;
  --warning: #d4a61b;
  --card: #1c1917;
  --hp-fill: #7a9a7e;
  --enemy-hp-fill: #c0622d;
  --shadow: 0 2px 12px rgba(0,0,0,.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: "Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  transition: background .3s, color .3s;
  overflow-x: hidden;
}
.game-container {
  width: 100%; max-width: 480px;
  min-height: 100vh;
  position: relative;
  display: flex; flex-direction: column;
}
/* ===== Screen ===== */
.screen { display: none; flex: 1; flex-direction: column; padding: 20px; }
.screen.active { display: flex; }

/* ===== Title Screen ===== */
.title-screen {
  align-items: center; justify-content: center;
  text-align: center; gap: 16px;
  background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
}
.title-logo {
  font-family: "Noto Serif SC","Songti SC",serif;
  font-size: 2.2rem; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--c2), var(--c4));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
  animation: logoFloat 3s ease-in-out infinite;
}
@keyframes logoFloat {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}
.title-sub {
  font-size: .9em; color: var(--text3);
  letter-spacing: .1em;
}
.title-desc {
  font-size: .82em; color: var(--text2);
  max-width: 280px; line-height: 1.6;
}
.title-sparkles { font-size: 1.6em; animation: sparkle 2s ease-in-out infinite; }
@keyframes sparkle {
  0%,100% { opacity: .5; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.15); }
}

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 12px 32px;
  border: none; border-radius: 25px;
  font-size: 1em; font-weight: 600;
  cursor: pointer; transition: all var(--transition);
  font-family: inherit;
  min-height: 48px;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.btn:active { transform: scale(.96); }
.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--c2));
  color: #fff; box-shadow: 0 4px 16px rgba(139,111,71,.3);
}
.btn-primary:hover { box-shadow: 0 6px 24px rgba(139,111,71,.45); transform: translateY(-2px); }
.btn-secondary {
  background: var(--card); color: var(--text);
  border: 2px solid var(--border);
}
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-sm { padding: 8px 18px; font-size: .85em; min-height: 38px; border-radius: 20px; }
.btn-xs { padding: 5px 12px; font-size: .75em; min-height: 30px; border-radius: 14px; }

/* ===== Top Bar ===== */
.game-topbar {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 0; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.game-topbar .back-btn {
  background: none; border: none; cursor: pointer;
  color: var(--text2); font-size: 1.2em; padding: 4px;
  display: flex; align-items: center;
}
.game-topbar .back-btn:hover { color: var(--accent); }
.game-topbar .stage-name {
  flex: 1; font-weight: 600; font-size: .95em;
  font-family: "Noto Serif SC","Songti SC",serif;
}
.game-topbar .stage-info {
  font-size: .78em; color: var(--text3);
  display: flex; align-items: center; gap: 8px;
}

/* ===== Map Screen ===== */
.map-screen { gap: 8px; }
.map-title {
  text-align: center; padding: 16px 0 8px;
  font-family: "Noto Serif SC","Songti SC",serif;
}
.map-title h2 { font-size: 1.3rem; color: var(--text); }
.map-title p { font-size: .78em; color: var(--text3); margin-top: 4px; }

.player-stats {
  display: flex; gap: 12px; justify-content: center;
  flex-wrap: wrap; padding: 8px 0 16px;
}
.stat-chip {
  display: flex; align-items: center; gap: 5px;
  padding: 6px 14px; border-radius: 20px;
  background: var(--card); border: 1px solid var(--border);
  font-size: .82em; font-weight: 600; color: var(--text2);
}
.stat-chip .sc-icon { font-size: 1.1em; }
.stat-chip .sc-val { color: var(--accent); }

.world-list { display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto; }
.world-card {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 18px; border-radius: var(--radius);
  background: var(--card); border: 2px solid var(--border);
  cursor: pointer; transition: all var(--transition);
  text-decoration: none; position: relative;
}
.world-card:hover { border-color: var(--accent); box-shadow: var(--shadow); transform: translateX(4px); }
.world-card.locked { opacity: .45; cursor: not-allowed; pointer-events: none; }
.world-card.completed { border-color: var(--success); }
.world-card.completed::after {
  content: '✓'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  font-size: 1.3em; color: var(--success); font-weight: 700;
}
.world-icon {
  width: 52px; height: 52px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6em; flex-shrink: 0;
  color: #fff; font-weight: 700;
}
.world-body { flex: 1; min-width: 0; }
.world-name { font-weight: 600; font-size: .95em; color: var(--text); margin-bottom: 2px; }
.world-desc { font-size: .76em; color: var(--text3); }
.world-progress {
  font-size: .72em; color: var(--text3); margin-top: 4px;
}
.world-progress-bar {
  height: 3px; background: var(--border); border-radius: 2px; margin-top: 4px; overflow: hidden;
}
.world-progress-fill {
  height: 100%; border-radius: 2px; transition: width .5s;
}

/* ===== Battle Screen ===== */
.battle-screen { gap: 0; padding: 16px; }
.battle-header {
  display: flex; align-items: center; gap: 10px;
  padding-bottom: 12px; border-bottom: 1px solid var(--border);
}
.battle-header .bh-back {
  background: none; border: none; cursor: pointer;
  color: var(--text2); font-size: 1.1em; padding: 4px;
}
.battle-header .bh-title {
  flex: 1; font-size: .82em; color: var(--text3);
  font-weight: 600;
}
.battle-header .bh-score {
  font-size: .8em; color: var(--accent); font-weight: 700;
}

/* Enemy Area */
.enemy-area {
  display: flex; flex-direction: column; align-items: center;
  padding: 20px 0 16px; gap: 8px;
}
.enemy-sprite {
  font-size: 4rem; animation: enemyIdle 2s ease-in-out infinite;
  filter: drop-shadow(0 4px 8px rgba(0,0,0,.15));
}
@keyframes enemyIdle {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-6px); }
}
.enemy-sprite.hit { animation: enemyHit .4s ease-out; }
@keyframes enemyHit {
  0% { transform: translateX(0); }
  25% { transform: translateX(-12px); }
  50% { transform: translateX(12px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}
.enemy-name {
  font-family: "Noto Serif SC","Songti SC",serif;
  font-weight: 600; font-size: 1.1em; color: var(--text);
}
.enemy-hp-bar {
  width: 220px; height: 10px; background: var(--border);
  border-radius: 5px; overflow: hidden;
}
.enemy-hp-fill {
  height: 100%; border-radius: 5px;
  background: var(--enemy-hp-fill);
  transition: width .5s ease;
  width: 100%;
}

/* Battle Log */
.battle-log {
  min-height: 28px; text-align: center; padding: 6px 0;
  font-size: .82em; font-weight: 600; color: var(--text);
}
.battle-log.damage { color: var(--accent); }
.battle-log.enemy-damage { color: var(--danger); }
.battle-log.combo { color: var(--warning); }

/* Question Area */
.question-area {
  background: var(--card); border: 2px solid var(--border);
  border-radius: var(--radius); padding: 18px;
  margin: 8px 0 12px;
}
.question-label {
  font-size: .7em; color: var(--text3); font-weight: 700;
  text-transform: uppercase; letter-spacing: .06em; margin-bottom: 6px;
}
.question-text {
  font-size: 1.05em; font-weight: 600; color: var(--text);
  line-height: 1.5; margin-bottom: 4px;
}
.question-text .jpq {
  font-family: "Noto Serif JP","Hiragino Mincho ProN",serif;
  font-size: 1.1em;
}
.question-hint {
  font-size: .75em; color: var(--text3); margin-top: 4px;
  font-style: italic;
}

/* Boss Mechanic Indicator */
.boss-mech-indicator {
  text-align: center; padding: 6px 12px;
  font-size: .75em; font-weight: 600;
  color: var(--danger); margin-bottom: 4px;
  border-radius: var(--radius-sm);
  background: color-mix(in srgb, var(--danger) 8%, transparent);
  animation: mechPulse 2s ease-in-out infinite;
}
@keyframes mechPulse {
  0%,100% { opacity: .8; }
  50% { opacity: 1; background: color-mix(in srgb, var(--danger) 15%, transparent); }
}
.bmi-badge {
  display: inline-block; padding: 1px 8px; border-radius: 8px;
  font-size: .85em; font-weight: 700;
  background: color-mix(in srgb, var(--danger) 20%, transparent);
  color: var(--danger); margin-right: 4px;
}
.bmi-badge.broken {
  color: var(--success);
  background: color-mix(in srgb, var(--success) 20%, transparent);
}
.bmi-badge.active {
  animation: badgeGlow 1s ease-in-out infinite;
}
@keyframes badgeGlow {
  0%,100% { box-shadow: 0 0 0 0 color-mix(in srgb, var(--danger) 30%, transparent); }
  50% { box-shadow: 0 0 8px 2px color-mix(in srgb, var(--danger) 50%, transparent); }
}

/* Skill Card Tray */
.skill-tray {
  display: flex; gap: 6px; justify-content: center;
  padding: 4px 0 8px; flex-wrap: wrap;
}
.skill-card {
  display: flex; align-items: center; gap: 3px;
  padding: 5px 10px; border-radius: 16px;
  background: var(--card); border: 1.5px solid var(--border);
  cursor: pointer; font-size: .72em; font-weight: 600;
  color: var(--text2); transition: all .2s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.skill-card:hover {
  border-color: var(--accent); color: var(--accent);
  transform: translateY(-1px); box-shadow: var(--shadow);
}
.skill-card:active { transform: scale(.95); }
.skill-card .sk-icon { font-size: 1.15em; }
.skill-card .sk-name { white-space: nowrap; }
.skill-card.used {
  opacity: .35; pointer-events: none;
  border-style: dashed;
}

/* Options */
.options-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 12px;
}
.option-btn {
  padding: 14px 12px; border: 2px solid var(--border);
  border-radius: var(--radius-sm); background: var(--card);
  font-size: 1em; font-weight: 500; cursor: pointer;
  font-family: inherit; transition: all .15s;
  text-align: center; min-height: 52px;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  color: var(--text);
}
.option-btn .jpq {
  font-family: "Noto Serif JP","Hiragino Mincho ProN",serif;
  font-size: 1.05em;
}
.option-btn:hover:not(.disabled) {
  border-color: var(--accent); background: var(--bg2);
}
.option-btn.correct {
  border-color: var(--success); background: #e0ebe2;
  color: var(--success); font-weight: 700;
  animation: pulse .5s ease;
}
.option-btn.wrong {
  border-color: var(--danger); background: #f5e0d8;
  color: var(--danger);
  animation: shake .5s ease;
}
[data-theme="dark"] .option-btn.correct { background: #1a2a1e; }
[data-theme="dark"] .option-btn.wrong { background: #2a1a14; }
[data-theme="dark"] .question-area { background: #211d19; border-color: #4a3e35; }
[data-theme="dark"] .review-card { background: #211d19; }
.option-btn.disabled { pointer-events: none; opacity: .6; }
@keyframes pulse {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}
@keyframes shake {
  0%,100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* Player Stats Bar */
.player-bar {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-top: 1px solid var(--border);
}
.player-avatar {
  font-size: 2rem; flex-shrink: 0;
}
.player-info { flex: 1; }
.player-name { font-size: .82em; font-weight: 600; color: var(--text); }
.player-hp-bar {
  height: 8px; background: var(--border);
  border-radius: 4px; overflow: hidden; margin: 4px 0;
}
.player-hp-fill {
  height: 100%; border-radius: 4px;
  background: var(--hp-fill); transition: width .5s ease;
}
.player-hp-text { font-size: .7em; color: var(--text3); }

.combo-display {
  flex-shrink: 0; text-align: center;
  font-size: .85em; font-weight: 700; color: var(--warning);
  min-width: 48px;
}
.combo-display .combo-num { font-size: 1.4em; line-height: 1; }

/* Power-up buttons */
.powerup-row {
  display: flex; gap: 8px; justify-content: center;
  flex-wrap: wrap; padding: 8px 0;
}

/* ===== Result Screen ===== */
.result-screen {
  align-items: center; justify-content: center;
  text-align: center; gap: 14px;
}
.result-icon { font-size: 4rem; animation: popIn .5s ease; }
@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  70% { transform: scale(1.2); }
  100% { transform: scale(1); opacity: 1; }
}
.result-title {
  font-family: "Noto Serif SC","Songti SC",serif;
  font-size: 1.6rem; font-weight: 700;
}
.result-title.win { color: var(--success); }
.result-title.lose { color: var(--danger); }
.result-stats {
  display: flex; flex-direction: column; gap: 6px;
  color: var(--text2); font-size: .88em; padding: 8px 0;
}
.result-stats span { font-weight: 600; color: var(--accent); }

/* ===== Shop Screen ===== */
.shop-screen { gap: 8px; }
.shop-title {
  text-align: center; padding: 16px 0 8px;
  font-family: "Noto Serif SC","Songti SC",serif;
}
.shop-coins {
  text-align: center; font-size: 1.2em; font-weight: 700;
  color: var(--warning); padding: 4px 0;
}
.shop-items { display: flex; flex-direction: column; gap: 10px; flex: 1; }
.shop-item {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px; border-radius: var(--radius);
  background: var(--card); border: 2px solid var(--border);
}
.shop-item-icon { font-size: 2rem; flex-shrink: 0; }
.shop-item-body { flex: 1; }
.shop-item-name { font-weight: 600; font-size: .92em; }
.shop-item-desc { font-size: .76em; color: var(--text3); }
.shop-item-cost { font-size: .82em; font-weight: 700; color: var(--warning); }

/* ===== Toast ===== */
.toast {
  position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg); padding: 10px 24px;
  border-radius: 24px; font-size: .85em; font-weight: 600;
  z-index: 1000; opacity: 0; pointer-events: none;
  transition: opacity .3s, transform .3s; transform: translateX(-50%) translateY(10px);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ===== Particles ===== */
.particles-container {
  position: fixed; inset: 0; pointer-events: none; z-index: 999;
}
.particle {
  position: absolute; width: 8px; height: 8px; border-radius: 50%;
  animation: particleFly .8s ease-out forwards;
}
@keyframes particleFly {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--px),var(--py)) scale(0); opacity: 0; }
}

/* ===== Responsive ===== */
@media (max-width: 480px) {
  .title-logo { font-size: 1.7rem; }
  .enemy-sprite { font-size: 3.2rem; }
  .enemy-hp-bar { width: 180px; }
  .options-grid { gap: 8px; }
  .option-btn { padding: 12px 10px; font-size: .92em; min-height: 48px; }
  .world-card { padding: 12px 14px; }
}
@media (max-width: 360px) {
  .options-grid { grid-template-columns: 1fr; }
}

/* ===== Optimization: Floating Damage Numbers ===== */
.float-dmg {
  position: fixed; pointer-events: none; z-index: 1000;
  font-size: 1.4em; font-weight: 800; color: var(--accent);
  animation: floatUp .9s ease-out forwards;
  text-shadow: 0 2px 6px rgba(0,0,0,.3);
}
.float-dmg.enemy-dmg { color: var(--danger); }
.float-dmg.crit { color: var(--warning); font-size: 1.8em; }
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  40% { opacity: 1; transform: translateY(-32px) scale(1.2); }
  100% { opacity: 0; transform: translateY(-64px) scale(.8); }
}

/* ===== Optimization: Screen Shake ===== */
.shake { animation: screenShake .4s ease-out; }
@keyframes screenShake {
  0%,100% { transform: translateX(0); }
  15% { transform: translateX(-6px) translateY(2px); }
  30% { transform: translateX(6px) translateY(-2px); }
  45% { transform: translateX(-4px); }
  60% { transform: translateX(4px); }
  75% { transform: translateX(-2px); }
  90% { transform: translateX(2px); }
}

/* ===== Optimization: Boss Battle Atmosphere ===== */
.boss-fight .question-area {
  border-color: var(--danger) !important;
  box-shadow: 0 0 20px rgba(160,82,45,.15);
  animation: bossPulse 2s ease-in-out infinite;
}
@keyframes bossPulse {
  0%,100% { box-shadow: 0 0 12px rgba(160,82,45,.1); }
  50% { box-shadow: 0 0 28px rgba(160,82,45,.25); }
}
.boss-fight .enemy-sprite {
  filter: drop-shadow(0 0 12px rgba(255,60,30,.4));
}
[data-theme="dark"] .boss-fight .question-area {
  box-shadow: 0 0 24px rgba(200,80,40,.25);
}

/* ===== Optimization: Player Damage Flash ===== */
.player-flash { animation: playerFlash .5s ease-out; }
@keyframes playerFlash {
  0% { background: rgba(160,82,45,.2); }
  100% { background: transparent; }
}

/* ===== Optimization: Wrong Answer Review Screen ===== */
.review-screen { gap: 8px; }
.review-title {
  text-align: center; padding: 16px 0 8px;
  font-family: "Noto Serif SC","Songti SC",serif;
}
.review-title h2 { font-size: 1.2rem; color: var(--text); }
.review-title p { font-size: .78em; color: var(--text3); margin-top: 4px; }

.review-filters {
  display: flex; gap: 6px; flex-wrap: wrap; padding: 0 0 8px;
  justify-content: center;
}
.review-filter-chip {
  padding: 5px 14px; border: 2px solid var(--border);
  border-radius: 16px; font-size: .78em; font-weight: 600;
  cursor: pointer; background: var(--card); color: var(--text2);
  transition: all .2s; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.review-filter-chip.active {
  border-color: var(--accent); background: var(--accent); color: #fff;
}
.review-filter-chip:hover:not(.active) { border-color: var(--accent); }

.review-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.review-card {
  background: var(--card); border: 2px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  transition: all .2s;
}
.review-card .rv-label {
  font-size: .68em; color: var(--text3); font-weight: 700;
  text-transform: uppercase; letter-spacing: .04em; margin-bottom: 4px;
}
.review-card .rv-question {
  font-size: .92em; font-weight: 600; color: var(--text);
  margin-bottom: 6px; line-height: 1.5;
}
.review-card .rv-wrong {
  font-size: .8em; color: var(--danger); margin-bottom: 2px;
}
.review-card .rv-correct {
  font-size: .8em; color: var(--success); margin-bottom: 4px;
}

/* ===== Roguelike: Talent Tree Screen ===== */
.talent-screen { gap: 8px; }

  text-align: center; padding: 16px 0 8px;
  font-family: "Noto Serif SC","Songti SC",serif;
}
.talent-header h2 { font-size: 1.2rem; color: var(--text); }
.talent-header p { font-size: .78em; color: var(--text3); margin-top: 4px; }
.talent-coins {

.talent-grid { display: flex; flex-direction: column; gap: 10px; flex: 1; overflow-y: auto; }
.talent-card {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: var(--radius);
  background: var(--card); border: 2px solid var(--border);
  transition: all var(--transition);
}
.talent-card.maxed { border-color: var(--success); opacity: .5; }
.talent-card .t-icon {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2em; flex-shrink: 0; color: #fff; font-weight: 700;
}
.talent-card .t-body { flex: 1; min-width: 0; }
.talent-card .t-name { font-weight: 600; font-size: .9em; color: var(--text); }
.talent-card .t-effect { font-size: .72em; color: var(--text3); margin-top: 2px; }

}

  background: var(--border);
}
.talent-card .t-dot.filled { background: var(--accent); }
.talent-card .t-action {
  flex-shrink: 0;
}
.talent-card .t-cost {
  font-size: .78em; font-weight: 700; color: var(--warning);
}

/* ===== Roguelike: Path Map (Branching) ===== */
.path-screen { gap: 8px; }
.path-title {
  text-align: center; padding: 16px 0 8px;
  font-family: "Noto Serif SC","Songti SC",serif;
}
.path-title h2 { font-size: 1.2rem; color: var(--text); }
.path-title p { font-size: .78em; color: var(--text3); margin-top: 4px; }
.path-map {
  flex: 1; overflow-y: auto; display: flex; flex-direction: column;
  align-items: center; gap: 16px; padding: 12px 0;
}
.path-layer {
  display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
}
.path-node {
  width: 90px; padding: 10px 8px; border-radius: var(--radius);
  text-align: center; cursor: pointer; transition: all var(--transition);
  border: 2px solid var(--border); background: var(--card);
  font-size: .76em; font-weight: 600; color: var(--text);
  position: relative;
}
.path-node:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.path-node.done { opacity: .4; pointer-events: none; }
.path-node.taken { border-color: var(--accent); }
.path-node .pn-icon { font-size: 1.6em; display: block; margin-bottom: 4px; }
.path-node .pn-name { font-size: .85em; line-height: 1.3; }
.path-node .pn-meta { font-size: .7em; color: var(--text3); margin-top: 2px; }
.path-node.type-easy { border-color: #97C459; }
.path-node.type-hard { border-color: #EF9F27; }
.path-node.type-mystery { border-color: #378ADD; }
.path-node.type-shop { border-color: #D4537E; }
.path-node.type-boss { border-color: #E24B4A; }
.path-node .pn-mod {
  display: inline-block; padding: 1px 6px; border-radius: 8px;
  font-size: .65em; margin-top: 2px; background: rgba(0,0,0,.08);
}
[data-theme="dark"] .path-node .pn-mod { background: rgba(255,255,255,.08); }

/* ===== Roguelike: Artifact Pick Overlay ===== */
.artifact-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  z-index: 500; display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.artifact-panel {
  background: var(--bg); border-radius: var(--radius);
  padding: 24px 20px; max-width: 420px; width: 100%;
  border: 2px solid var(--accent); text-align: center;
}
.artifact-panel h3 {
  font-family: "Noto Serif SC","Songti SC",serif;
  font-size: 1.1rem; color: var(--accent); margin-bottom: 4px;
}
.artifact-panel .ap-sub { font-size: .78em; color: var(--text3); margin-bottom: 16px; }
.artifact-choices { display: flex; flex-direction: column; gap: 10px; }
.artifact-choice {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-radius: var(--radius);
  background: var(--card); border: 2px solid var(--border);
  cursor: pointer; transition: all var(--transition); text-align: left;
}
.artifact-choice:hover { border-color: var(--accent); transform: translateX(4px); }
.artifact-choice .ac-icon { font-size: 1.8em; flex-shrink: 0; }
.artifact-choice .ac-body { flex: 1; }
.artifact-choice .ac-name { font-weight: 600; font-size: .9em; color: var(--text); }
.artifact-choice .ac-desc { font-size: .74em; color: var(--text3); margin-top: 2px; }
.artifact-choice .ac-rarity { font-size: .7em; margin-top: 2px; }
.artifact-choice .ac-rarity.common { color: var(--text3); }
.artifact-choice .ac-rarity.rare { color: var(--accent); }
.artifact-choice .ac-rarity.legendary { color: var(--warning); }

/* ===== Roguelike: Enemy Modifier Badge ===== */
.mod-badge {
  display: inline-block; padding: 2px 8px; border-radius: 10px;
  font-size: .7em; font-weight: 600; margin-left: 6px;
  vertical-align: middle;
}
.mod-badge.mod-iron { background: #ccc; color: #555; }
.mod-badge.mod-fury { background: #FAC775; color: #854F0B; }
.mod-badge.mod-regen { background: #C0DD97; color: #3B6D11; }
.mod-badge.mod-slow { background: #B5D4F4; color: #185FA5; }
[data-theme="dark"] .mod-badge.mod-iron { background: #444; color: #aaa; }

  /* ===== Translation Button ===== */
  .translation-btn {
    display: inline-flex; align-items: center; justify-content: center;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--accent); color: #fff; font-size: .6em; font-weight: 700;
    border: none; cursor: pointer; margin-left: 4px;
    vertical-align: middle; transition: all .2s;
    padding: 0; line-height: 1;
  }
  .translation-btn:hover { transform: scale(1.2); box-shadow: 0 2px 6px rgba(0,0,0,.2); }
  .translation-text {
    display: none; font-size: .82em; color: var(--text2);
    margin-top: 4px; padding: 6px 10px;
    background: color-mix(in srgb, var(--accent) 8%, transparent);
    border-radius: var(--radius-sm); border-left: 3px solid var(--accent);
  }
  .translation-text.show { display: block; animation: fadeIn .3s ease; }
  @keyframes fadeIn { 0% { opacity: 0; transform: translateY(-4px); } 100% { opacity: 1; transform: translateY(0); } }

  /* ===== Prologue & Ending Screens ===== */
  .prologue-screen, .ending-screen {
    position: fixed; inset: 0; background: var(--bg); z-index: 2000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 40px 24px; text-align: center; gap: 16px;
    animation: fadeIn .5s ease;
  }
  .prologue-screen .scene-text, .ending-screen .scene-text {
    font-family: "Noto Serif SC","Songti SC",serif;
    font-size: 1.1rem; line-height: 2; color: var(--text);
    max-width: 480px; white-space: pre-line;
  }
  .prologue-screen .npc-name, .ending-screen .npc-name {
    font-size: .82em; font-weight: 700; color: var(--accent);
    margin-bottom: 4px;
  }
  .prologue-screen .scene-icon, .ending-screen .scene-icon {
    font-size: 4rem; animation: logoFloat 3s ease-in-out infinite;
  }
  .prologue-screen .skip-btn, .ending-screen .skip-btn {
    position: absolute; top: 16px; right: 16px;
    background: none; border: 1px solid var(--border); color: var(--text3);
    padding: 6px 14px; border-radius: 16px; font-size: .72em; cursor: pointer;
  }
  .prologue-screen .skip-btn:hover, .ending-screen .skip-btn:hover { color: var(--text); border-color: var(--accent); }

  /* reduced motion */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      transition-duration: .01ms !important;
    }
  }
</style>
</head>

  function showBossDialogue(stage, callback) {
    var lines = BOSS_DIALOGUES[stage.id];
    if (!lines || lines.length === 0) { callback(); return; }
    
    var overlay = document.getElementById('artifactOverlay');
    var panel = document.getElementById('artifactPanel');
    overlay.style.display = 'flex';
    
    var dialogueIdx = 0;
    
    function renderDialogueLine() {
      if (dialogueIdx >= lines.length) {
        // Dialogue complete, begin battle
        overlay.style.display = 'none';
        callback();
        return;
      }
      var line = lines[dialogueIdx];
      var textId = 'boss-dialogue-' + dialogueIdx;
      var html = '';
      html += '<h3 style="font-size:1.1rem">' + line.icon + ' ' + line.speaker + '</h3>';
      html += '<div style="font-size:1.05em;line-height:1.8;padding:12px 0;color:var(--text)">';
      html += line.jp + ' ';
      html += createTranslationButton(line.jp, line.zh, textId);
      html += '</div>';
      html += '<button class="btn btn-primary btn-sm" id="btnBossNext">次へ →</button>';
      
      panel.innerHTML = html;
      
      document.getElementById('btnBossNext').addEventListener('click', function() {
        dialogueIdx++;
        renderDialogueLine();
      });
    }
    
    renderDialogueLine();
  }

  function pickArtifactChoices(hardBonus) {
    var pool = ARTIFACTS.slice();
    var choices = [];
    var weights = { common: 3, rare: 2, legendary: 1 };
    if (hardBonus) { weights.rare += 1; weights.legendary += 1; }
    var totalW = pool.reduce(function(a,x){return a+weights[x.rarity];},0);

    for (var n = 0; n < 3; n++) {
      var r = Math.random() * totalW;
      var acc = 0;
      var pick = null;
      for (var i = 0; i < pool.length; i++) {
        acc += weights[pool[i].rarity];
        if (r <= acc) { pick = pool[i]; break; }
      }
      if (pick) {
        choices.push(pick);
        totalW -= weights[pick.rarity];
        pool = pool.filter(function(a){return a.id!==pick.id;});
        weights[pick.rarity] = 0;
      }
    }
    return choices;
  }

    for (var i = a.length - 1; i > 0; i--) {

      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  // ========== ROGUELIKE: PATH MAP ==========
  function generatePath(world) {
    var stages = world.stages;
    var boss = stages[stages.length - 1]; // boss is last
    var normal = stages.filter(function(s) { return !s.boss; });

    // Build 3 layers + boss
    var path = { layers: [], boss: null, world: world };
    var layerSizes = [2, 3, 2]; // layer 1: 2 nodes, layer 2: 3 nodes, layer 3: 2 nodes

    // World difficulty scaling for path generation
    var worldIdx = WORLDS.findIndex(function(w) { return w.id === world.id; });
    var diffScale = worldIdx; // 0~4
    var easyChance = 0.40 - diffScale * 0.05;     // w1:40% → w5:20%
    var hardChance = 0.25 + diffScale * 0.04;     // w1:25% → w5:41%
    var mysteryChance = 0.18 + diffScale * 0.01;   // w1:18% → w5:22%
    // shop fills the rest

    var shuffled = normal.slice().sort(function() { return Math.random() - .5; });
    var idx = 0;

    for (var l = 0; l < layerSizes.length; l++) {
      var layer = [];
      for (var n = 0; n < layerSizes[l]; n++) {
        if (idx >= shuffled.length) break;
        var stage = shuffled[idx++];
        // Assign node type with world-dependent probabilities
        var nodeType;
        var r = Math.random();
        if (r < easyChance) nodeType = 'easy';
        else if (r < easyChance + hardChance) nodeType = 'hard';
        else if (r < easyChance + hardChance + mysteryChance) nodeType = 'mystery';
        else nodeType = 'shop';

        var node = {
          type: nodeType,
          stage: stage,
          id: 'pn_' + l + '_' + n,
          done: false,
          taken: false
        };

        // Hard nodes get a random modifier
        if (nodeType === 'hard') {
          node.modifier = MODIFIERS[Math.floor(Math.random() * MODIFIERS.length)];
        }

        layer.push(node);
      }
      if (layer.length > 0) path.layers.push(layer);
    }
    path.boss = { type: 'boss', stage: boss, id: 'pn_boss', done: false, taken: false };
    return path;
  }

  function showPathMap(world) {
    showScreen('path');
    if (!state.runPath || state.runPath.world.id !== world.id) {
      state.runPath = generatePath(world);
    }

    document.getElementById('pathWorldName').textContent = world.icon + ' ' + world.name;
    document.getElementById('pathHp').textContent = state.playerHp + '/' + state.maxHp;

    var mapEl = document.getElementById('pathMap');
    mapEl.innerHTML = '';

    var path = state.runPath;

    // Show current artifacts
    if (state.runArtifacts.length > 0) {
      var artBar = document.createElement('div');
      artBar.style.cssText = 'display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:0 0 8px';
      artBar.innerHTML = '<span style="font-size:.72em;color:var(--text3)">遗物: </span>';
      state.runArtifacts.forEach(function(a) {

        tag.textContent = a.icon + ' ' + a.name;
        artBar.appendChild(tag);
      });
      mapEl.appendChild(artBar);
    }

    // Render layers + boss
    var allLayers = path.layers.concat([[path.boss]]);
    allLayers.forEach(function(layer) {
      var row = document.createElement('div');
      row.className = 'path-layer';
      layer.forEach(function(node) {
        var btn = document.createElement('div');
        btn.className = 'path-node type-' + node.type;
        if (node.done) btn.classList.add('done');
        if (node.taken) btn.classList.add('taken');

        var typeEmoji = { easy: '🟢', hard: '🟠', mystery: '🔵', shop: '🏪', boss: '👹' };
        btn.innerHTML =
          '<span class="pn-icon">' + (node.stage ? node.stage.eicon : typeEmoji[node.type]) + '</span>' +
          '<span class="pn-name">' + (node.type === 'boss' ? 'BOSS' : node.stage ? node.stage.name : node.type) + '</span>';

        if (node.modifier) {
          btn.innerHTML += '<span class="pn-mod">' + node.modifier.icon + ' ' + node.modifier.name + '</span>';
        }

        if (node.type === 'mystery') {
          btn.innerHTML += '<span class="pn-meta">???</span>';
        } else if (node.type === 'shop') {
          btn.innerHTML += '<span class="pn-meta">🏪</span>';
        } else if (node.stage && !node.done) {
          btn.innerHTML += '<span class="pn-meta">HP:' + (node.stage.hp || '?') + ' Q:' + (node.stage.questions || '?') + '</span>';
        }

        if (!node.done && !node.taken) {
          btn.addEventListener('click', function() { handlePathNode(node); });
        }
        row.appendChild(btn);
      });
      mapEl.appendChild(row);

      // Add connector between layers (skip after boss)
      if (layer !== allLayers[allLayers.length - 1]) {
        var conn = document.createElement('div');
        conn.style.cssText = 'font-size:1.2em;color:var(--text3);text-align:center;padding:2px 0';
        conn.textContent = '⬇';
        mapEl.appendChild(conn);
      }
    });
  }

  function handlePathNode(node) {
    if (node.done || node.taken) return;
    node.taken = true;

    // Mark all nodes in this layer as taken (to enforce single path)
    var path = state.runPath;
    var allLayers = path.layers.concat([[path.boss]]);
    for (var l = 0; l < allLayers.length; l++) {
      for (var n = 0; n < allLayers[l].length; n++) {
        if (allLayers[l][n].id === node.id) {
          // Found the layer - mark all as taken
          allLayers[l].forEach(function(x) { if (!x.done) x.taken = true; });
          break;
        }
      }
    }

    switch (node.type) {
      case 'easy':
      case 'hard':
        startBattle(path.world, node.stage, node.modifier);
        break;
      case 'mystery':
        handleMystery(node);
        break;
      case 'shop':
        handleShopNode(node);
        break;
      case 'boss':
        startBattle(path.world, node.stage, null);
        break;
    }
  }

      div.addEventListener('click', function() {
        if (state.coins >= cost) {

    document.getElementById('btnShopBack').onclick = function() {
      showPathMap(state.runPath.world);
    };
  }

  // ========== BATTLE ==========
  function startBattle(world, stage, modifier) {
    showScreen('battle');
    var modLabel = modifier ? ' [' + modifier.icon + ' ' + modifier.name + ']' : '';
    document.getElementById('battleStageName').textContent = world.name + ' · ' + stage.name + modLabel;
    document.getElementById('battleScore').textContent = state.score;

    // Apply modifier to stage
    var effectiveStage = {
      id: stage.id,
      name: stage.name,
      ename: stage.ename,
      eicon: stage.eicon,
      hp: stage.hp,
      damage: stage.damage,
      questions: stage.questions,
      boss: stage.boss,
      isReview: stage.isReview,
      reviewPool: stage.reviewPool,
      goldMult: 1.0,
      regen: 0
    };
    var dmgMod = function(d) { return d; };
    if (modifier) {
      dmgMod = modifier.apply(effectiveStage);
      effectiveStage.modifier = modifier;
    }

    // Apply curse from mystery event
    if (state._cursedStage) {
      effectiveStage.damage = Math.floor(effectiveStage.damage * 1.5);
      state._cursedStage = false;
      showToast('💀 诅咒生效！本场受伤×1.5');
    }

    // Boss fight atmosphere + mechanic init
    var battleScreen = document.getElementById('battleScreen');
    var bossMech = null;
    var bossPhaseIdx = 0;
    var bossPrevHp = null;
    if (stage.boss) {
      battleScreen.classList.add('boss-fight');
      if (stage.mechanic) {
        bossMech = stage.mechanic;
        bossPrevHp = effectiveStage.hp;
      }
    } else {
      battleScreen.classList.remove('boss-fight');
    }

    // Draw skill cards
    var drawnSkills = drawBattleSkills();

    battleState = {
      world: world,
      stage: effectiveStage,
      enemyHp: effectiveStage.hp,
      enemyMaxHp: effectiveStage.hp,
      questionCount: 0,
      totalQuestions: effectiveStage.questions,
      correctInStage: 0,
      answered: false,
      currentQuestion: null,
      usedInStage: [],
      usedInBossLoop: [],      // w4 boss time loop tracking
      dmgMod: dmgMod,
      shieldUsed: false,
      firstQuestion: true,
      // Boss mechanic state
      bossMechanic: bossMech,
      bossPhase: bossPhaseIdx,
      bossPrevPhaseHp: bossPrevHp,
      bossGateCount: 0,        // w5 boss gate counter
      // Skill card state
      drawnSkills: drawnSkills,
      activeSkill: null,       // { skill, pending: bool }
      skillUsed: false,        // prevent double-use
      skillEffect: {}           // { precise, shield, gold_rain, time_stop }
    };

    document.getElementById('enemySprite').textContent = stage.eicon;
    document.getElementById('enemySprite').classList.remove('hit');
    document.getElementById('enemyName').textContent = stage.ename;
    document.getElementById('enemyHpFill').style.width = '100%';
    document.getElementById('enemyHpText').textContent = battleState.enemyHp + '/' + battleState.enemyMaxHp;
    document.getElementById('battleLog').textContent = '';
    document.getElementById('battleLog').className = 'battle-log';
    document.getElementById('playerHpFill').style.width = (state.playerHp / state.maxHp * 100) + '%';
    document.getElementById('playerHpText').textContent = state.playerHp + '/' + state.maxHp;
    document.getElementById('comboCount').textContent = state.combo;
    document.getElementById('questionHint').textContent = '';

    // Show flavor text if available
    if (stage.flavor) {
      var flavorId = 'flavor-' + stage.id;
      var flavorHtml = stage.flavor + ' ';
      flavorHtml += createTranslationButton(stage.flavor, stage.flavorZh || '', flavorId);
      document.getElementById('battleLog').innerHTML = flavorHtml;
      document.getElementById('battleLog').className = 'battle-log';
    }

    // Render skill cards
    renderSkillCards();
    // Render boss mechanic indicator
    renderBossMechanic();

    updatePowerupButtons();
    // Boss battle: show dialogue before first question
    if (stage.boss) {
      showBossDialogue(stage, function() { nextQuestion(); });
    } else {
      nextQuestion();
    }
  }

  function nextQuestion() {
    if (battleState && battleState.isReview) {
      nextQuestionReview();
      return;
    }
    if (battleState.questionCount >= battleState.totalQuestions) {
      // Stage complete - victory!
      winStage();
      return;
    }
    if (state.playerHp <= 0) {
      loseStage();
      return;
    }

    battleState.answered = false;
    var options = document.getElementById('optionsGrid').querySelectorAll('.option-btn');
    options.forEach(function(o) { o.className = 'option-btn'; });

    // Pick question (Optimization 3: weighted with cooldown)
    var worldQs = QUESTIONS[battleState.world.id];
    var available = [];
    var recent = state.recentQuestions[battleState.world.id] || [];
    var COOLDOWN = Math.min(worldQs.length - 1, 6); // cooldown window

    worldQs.forEach(function(q, i) {
      if (battleState.usedInStage.indexOf(i) === -1) available.push(i);
    });
    if (available.length === 0) {
      battleState.usedInStage = [];
      available = worldQs.map(function(_, i) { return i; });
    }

    // Weight: recently used questions get lower probability
    // Boss mechanic: phase question filtering
    var weights = available.map(function(qi) {
      var q = worldQs[qi];
      // Boss phase filter
      if (battleState.bossMechanic && !getBossPhaseQuestionFilter(q)) return 0;
      var pos = recent.indexOf(qi);
      if (pos === -1) return 3;  // never used recently → high weight
      if (pos >= COOLDOWN - 2) return 0.2; // very recent → low weight
      return 1;
    });

    // If all weights are 0 (boss filter eliminated everything), fallback to all
    if (weights.reduce(function(a,b){return a+b;},0) === 0) {
      weights = available.map(function() { return 1; });
    }

    // Weighted random pick
    var totalW = weights.reduce(function(a, b) { return a + b; }, 0);
    var r = Math.random() * totalW;
    var acc = 0;
    var qi = available[0];
    for (var k = 0; k < available.length; k++) {
      acc += weights[k];
      if (r <= acc) { qi = available[k]; break; }
    }

    // Track in recent
    if (!state.recentQuestions[battleState.world.id]) {
      state.recentQuestions[battleState.world.id] = [];
    }
    state.recentQuestions[battleState.world.id].push(qi);
    if (state.recentQuestions[battleState.world.id].length > COOLDOWN) {
      state.recentQuestions[battleState.world.id].shift();
    }

    battleState.usedInStage.push(qi);
    battleState.currentQuestion = worldQs[qi];
    battleState.questionCount++;

    var q = battleState.currentQuestion;
    document.getElementById('questionLabel').textContent = q.label || '语法挑战';
    document.getElementById('questionText').textContent = q.q;
    document.getElementById('questionHint').textContent = '';
    document.getElementById('battleLog').textContent = '第 ' + battleState.questionCount + '/' + battleState.totalQuestions + ' 题';
    document.getElementById('battleLog').className = 'battle-log';

    // Shuffle options
    var indices = [0, 1, 2, 3];
    for (var i = indices.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
    }
    battleState.optionMap = indices;
    battleState.correctIdx = indices.indexOf(q.ans);

    var grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';
    indices.forEach(function(origIdx) {
      var btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = q.opts[origIdx];
      btn.addEventListener('click', function() { selectAnswer(origIdx, btn); });
      grid.appendChild(btn);
    });

    // Artifact: first_eye - auto-highlight correct answer for first question
    if (battleState.firstQuestion && state.runArtifacts.some(function(a) { return a.id === 'first_eye'; })) {
      var allOptBtns = grid.querySelectorAll('.option-btn');
      var hintIdx = battleState.correctIdx;
      allOptBtns.forEach(function(b, bi) {
        if (bi !== hintIdx) {
          b.style.opacity = '.35';
          b.style.pointerEvents = 'none';
        }
      });
      document.getElementById('questionHint').textContent = '👁️ 先制の眼：答案已呈现';
    }
    battleState.firstQuestion = false;
  }

  function selectAnswer(idx, btnEl) {
    if (battleState.answered) return;
    battleState.answered = true;

    var q = battleState.currentQuestion;
    var correct = idx === q.ans;
    var allBtns = document.getElementById('optionsGrid').querySelectorAll('.option-btn');

    // Disable all buttons
    allBtns.forEach(function(b) { b.classList.add('disabled'); });

    if (correct) {
      btnEl.classList.add('correct');
      state.combo++;
      if (state.combo > state.bestCombo) state.bestCombo = state.combo;
      state.totalCorrect++;
      battleState.correctInStage++;

      var critThreshold = 5;
      // Artifact: crit_low lowers threshold
      if (state.runArtifacts.some(function(a) { return a.id === 'crit_jewel'; })) critThreshold = 3;
      // Talent: crit lowers threshold further
      var critTl = getTalentLevel('crit');
      if (critTl > 0) {
        var critVals = [5,4,3];
        critThreshold = Math.min(critThreshold, critVals[critTl - 1]);
      }

      var dmg = 10 + state.combo * 2;
      // Artifact: combo_book adds flat bonus
      if (state.runArtifacts.some(function(a) { return a.id === 'combo_book'; })) dmg += 3;
      // Artifact: class_mastery for word class questions
      if (state.runArtifacts.some(function(a) { return a.id === 'class_mastery'; }) && q.label && q.label.indexOf('词类') >= 0) dmg += 12;
      // Artifact: particle_amulet for particle questions
      if (state.runArtifacts.some(function(a) { return a.id === 'particle_amulet'; }) && q.label && q.label.indexOf('助词') >= 0) dmg += 8;

      if (state.combo >= critThreshold) dmg = Math.floor(dmg * 1.5);
      // Artifact: fury_chance for 20% double damage
      if (state.runArtifacts.some(function(a) { return a.id === 'fury_horn'; }) && Math.random() < 0.2) {
        dmg = dmg * 2;
        showToast('📯 猛攻触发！双倍伤害！');
      }
      // Skill: precise strike
      if (battleState.skillEffect.precise) {
        dmg = dmg * 2;
        battleState.skillEffect.precise = false;
      }
      // Boss mechanic: apply damage modifier
      dmg = applyBossDamageMod(dmg);

      // Optimization 2: float damage number from enemy
      var enemyRect = document.getElementById('enemySprite').getBoundingClientRect();
      var dmgCls = state.combo >= 5 ? 'crit' : '';
      floatDamage(
        enemyRect.left + enemyRect.width / 2 - 20,
        enemyRect.top,
        '-' + dmg,
        dmgCls
      );

      battleState.enemyHp = Math.max(0, battleState.enemyHp - dmg);

      document.getElementById('battleLog').textContent = '✅ 正确！造成 ' + dmg + ' 点伤害！';
      document.getElementById('battleLog').className = 'battle-log damage';
      document.getElementById('enemySprite').classList.add('hit');
      document.getElementById('enemyHpFill').style.width = (battleState.enemyHp / battleState.enemyMaxHp * 100) + '%';
      document.getElementById('enemyHpText').textContent = battleState.enemyHp + '/' + battleState.enemyMaxHp;

      if (state.combo >= 3) {
        document.getElementById('comboCount').textContent = state.combo;
      }

      // Coins with gold bonus (talent + artifact + modifier)
      var goldBon = 1.0;
      var goldTl = getTalentLevel('gold_bonus');
      if (goldTl > 0) {
        var goldVals = [.2, .4, .6];
        goldBon += goldVals[goldTl - 1];
      }
      if (state.runArtifacts.some(function(a) { return a.id === 'gold_bell'; })) goldBon += 0.25;
      if (battleState.stage.goldMult) goldBon *= battleState.stage.goldMult;
      // Skill: gold rain
      if (battleState.skillEffect.gold_rain) {
        goldBon *= 3;
        battleState.skillEffect.gold_rain = false;
      }
      state.coins += Math.floor((12 + Math.floor(dmg / 4)) * goldBon);
      state.score += dmg * 10;

      // Boss phase check after damage
      checkBossPhase();
      renderBossMechanic();

      // Enemy regen (modifier + boss phase)
      if (battleState.stage.regen && battleState.enemyHp > 0) {
        battleState.enemyHp = Math.min(battleState.enemyMaxHp, battleState.enemyHp + battleState.stage.regen);
        document.getElementById('enemyHpFill').style.width = (battleState.enemyHp / battleState.enemyMaxHp * 100) + '%';
        document.getElementById('enemyHpText').textContent = battleState.enemyHp + '/' + battleState.enemyMaxHp;
      }

      // Check combo milestone
      if (state.combo === 5) {
        triggerShake();
        spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '#d4a61b');
        showToast('🔥 5连击！暴击加成！');
      }
      if (state.combo === 10) {
        triggerShake();
        spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '#c49a6c');
        showToast('⚡ 10连击！超级暴击！');
      }

      // Check enemy defeated
      if (battleState.enemyHp <= 0) {
        setTimeout(function() { winStage(); }, 800);
        return;
      }
    } else {
      btnEl.classList.add('wrong');
      allBtns[battleState.correctIdx].classList.add('correct');
      state.combo = 0;
      state.totalWrong++;

      // Optimization 1: record wrong answer
      var waEntry = {
        worldId: battleState.world.id,
        questionIdx: battleState.usedInStage[battleState.usedInStage.length - 1],
        timestamp: Date.now()
      };
      // Deduplicate: don't add if already exists
      var isDup = state.wrongAnswers.some(function(wa) {
        return wa.worldId === waEntry.worldId && wa.questionIdx === waEntry.questionIdx;
      });
      if (!isDup) {
        state.wrongAnswers.push(waEntry);
      }

      var enemyDmg = battleState.stage.damage;
      // Apply boss mechanic damage modifier
      enemyDmg = applyBossDamageToPlayer(enemyDmg);
      // Artifact: shield - first wrong answer per stage does no damage
      var hasShield = state.runArtifacts.some(function(a) { return a.id === 'shield'; });
      if (hasShield && !battleState.shieldUsed) {
        battleState.shieldUsed = true;
        enemyDmg = 0;
        showToast('🛡️ 语法の盾发动！伤害无效化！');
      }
      // Skill: iron defense
      if (battleState.skillEffect.shield) {
        enemyDmg = 0;
        battleState.skillEffect.shield = false;
        showToast('🛡️ 铁壁防御！伤害无效化！');
      }
      // Skill: time stop - skip enemy turn
      if (battleState.skillEffect.time_stop) {
        enemyDmg = 0;
        battleState.skillEffect.time_stop = false;
        showToast('⏳ 时间停止！敌人回合跳过！');
      }
      // Boss gate: reset on wrong answer
      if (battleState.bossMechanic && battleState.bossMechanic.type === 'final_gate') {
        battleState.bossGateCount = 0;
      }
      // Boss phase check on wrong (show phase stasis)
      renderBossMechanic();
      state.playerHp = Math.max(0, state.playerHp - enemyDmg);

      // Artifact: regen_on_wrong - heal 5HP after wrong answer
      if (state.runArtifacts.some(function(a) { return a.id === 'regen_ring'; }) && state.playerHp > 0) {
        state.playerHp = Math.min(state.maxHp, state.playerHp + 5);
      }

      // Optimization 2: float damage on player, flash player bar, shake
      var playerRect = document.querySelector('.player-bar').getBoundingClientRect();
      floatDamage(
        playerRect.left + playerRect.width / 2 - 20,
        playerRect.top - 10,
        '-' + enemyDmg,
        'enemy-dmg'
      );
      if (enemyDmg >= 20) triggerShake();
      document.querySelector('.player-bar').classList.add('player-flash');
      setTimeout(function() {
        document.querySelector('.player-bar').classList.remove('player-flash');
      }, 500);

      document.getElementById('battleLog').textContent = '❌ 错误！受到 ' + enemyDmg + ' 点伤害！正确答案是：' + q.opts[q.ans];
      document.getElementById('battleLog').className = 'battle-log enemy-damage';
      document.getElementById('questionHint').textContent = '💡 ' + (q.hint || '');
      document.getElementById('playerHpFill').style.width = (state.playerHp / state.maxHp * 100) + '%';
      document.getElementById('playerHpText').textContent = state.playerHp + '/' + state.maxHp;
      document.getElementById('comboCount').textContent = '0';

      if (state.playerHp <= 0) {
        setTimeout(function() { loseStage(); }, 1000);
        return;
      }
    }

    document.getElementById('battleScore').textContent = state.score;
    document.getElementById('comboCount').textContent = state.combo;
    saveState();

    setTimeout(function() { nextQuestion(); }, 1000);
  }

  function winStage() {
    var isBoss = battleState.stage.boss;
    var isReview = battleState.stage.isReview;
    var correctCount = battleState.correctInStage;
    var wasHard = !!battleState.stage.modifier;
    var finalBossId = battleState.stage.id; // Save before nullifying battleState

    if (!isReview) {
      state.completedStages[battleState.stage.id] = true;
    }
    battleState = null;
    state.score += 50;

    // Economy: stage clear gold bonus
    var clearGold = isBoss ? 60 : 30;
    state.coins += clearGold;

    // Artifact: stage_heal
    if (state.runArtifacts.some(function(a) { return a.id === 'heal_stone'; })) {
      state.playerHp = Math.min(state.maxHp, state.playerHp + 10);
    }

    // Unlock next world (skip for review battles)
    if (!isReview) {
      var worldIdx = WORLDS.findIndex(function(w) { return w.id === state.currentWorld; });
      if (worldIdx < WORLDS.length - 1) {
        var nextWorld = WORLDS[worldIdx + 1];
        if (state.unlockedWorlds.indexOf(nextWorld.id) === -1) {
          state.unlockedWorlds.push(nextWorld.id);
          showToast('🔓 解锁新世界：' + nextWorld.name + '！');
        }
      }
    }

    // Level up check
    var completedCount = Object.keys(state.completedStages).length;
    state.level = Math.floor(completedCount / 5) + 1;
    var hpTl = getTalentLevel('hp');
    if (hpTl > 0) {
      var hpBonus = TALENTS.find(function(t){return t.id==='hp';}).vals.slice(0,hpTl).reduce(function(a,b){return a+b;},0);
      state.maxHp = 100 + hpBonus;
    } else {
      state.maxHp = 100 + (state.level - 1) * 20;
    }
    state.playerHp = Math.min(state.maxHp, state.playerHp + 30);

    saveState();
    spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '#5a7a5e');

    showScreen('result');
    var icon = document.getElementById('resultIcon');
    var title = document.getElementById('resultTitle');
    var stats = document.getElementById('resultStats');
    var nextBtn = document.getElementById('btnNext');

    if (isReview) {
      icon.textContent = '📖';
      title.textContent = '错题挑战完成！';
      title.className = 'result-title win';
    } else if (isBoss) {
      var isFinalBossFlag = finalBossId === 'w5boss';
      icon.textContent = isFinalBossFlag ? '👑' : '🏆';
      title.textContent = isFinalBossFlag ? '魔 王 讨 伐！' : 'BOSS 击破！';
      title.className = 'result-title win';
    } else {
      icon.textContent = '🎉';
      title.textContent = '关卡通关！';
      title.className = 'result-title win';
    }

    stats.innerHTML =
      '<div>本关答对 <span>' + correctCount + '</span> 题</div>' +
      '<div>总得分 <span>' + state.score + '</span></div>' +
      '<div>金币 <span>' + state.coins + ' 💰</span></div>' +
      '<div>等级 <span>Lv.' + state.level + '</span></div>';

    var isFinalBossFlag = finalBossId === 'w5boss';
    nextBtn.textContent = isReview ? '📖 返回错题本' : (isFinalBossFlag ? '✨ 观看结局' : (isBoss ? '🗺️ 返回地图' : '▶ 继续'));
    nextBtn.onclick = function() {
      try {
        if (isReview) {
          showReview();
          return;
        }
        if (isFinalBossFlag) {
          showEnding();
          return;
        }
        if (isBoss) {
          showMap();
          return;
        }
        // Non-boss stage: show artifact pick, then continue path
        showArtifactPick(wasHard, function() {
          if (!state.runPath || !state.runPath.world) {
            console.warn('runPath missing, falling back to map');
            showMap();
            return;
          }
          showPathMap(state.runPath.world);
        });
      } catch(e) {
        console.error('winStage continue error:', e);
        showMap();
      }
    };
  }

  function loseStage() {
    var retryWorld = WORLDS.find(function(w) { return w.id === state.currentWorld; });
    var retryModifier = battleState.stage.modifier || null;
    var correctInStage = battleState ? battleState.correctInStage : 0;
    var totalQuestions = battleState ? battleState.totalQuestions : 0;
    state.combo = 0;
    state.playerHp = Math.max(1, state.playerHp); // Don't die completely
    saveState();

    showScreen('result');
    document.getElementById('resultIcon').textContent = '💔';
    document.getElementById('resultTitle').textContent = '战斗失败...';
    document.getElementById('resultTitle').className = 'result-title lose';
    document.getElementById('resultStats').innerHTML =
      '<div>不要气馁！</div>' +
      '<div>答对 <span>' + correctInStage + '</span>' +
      '/<span>' + totalQuestions + '</span> 题</div>' +
      '<div>总得分 <span>' + state.score + '</span></div>';
    document.getElementById('btnNext').textContent = '🔄 重试';
    document.getElementById('btnNext').onclick = function() {
      // Restore HP a bit
      state.playerHp = Math.min(state.maxHp, state.playerHp + 20);
      saveState();
      // Re-enter stage with original world and modifier
      if (retryWorld) {
        var origStage = retryWorld.stages.find(function(s) { return s.id === battleState.stage.id; }) || battleState.stage;
        startBattle(retryWorld, origStage, retryModifier);
      } else {
        showMap();
      }
    };
  }

  document.getElementById('btnMap').addEventListener('click', showMap);
  document.getElementById('btnFlee').addEventListener('click', function() {
    if (confirm('确定要逃跑吗？当前关卡进度将丢失。')) {
      state.combo = 0;
      battleState = null;
      saveState();
      if (state.runPath) {
        showPathMap(state.runPath.world);
      } else {
        showMap();
      }
    }
  });

  // ========== POWER-UPS ==========
  function updatePowerupButtons() {
    document.getElementById('puHint').textContent = '💡 提示 (-20💰) [' + state.items.hint + ']';
    document.getElementById('puSkip').textContent = '⏭️ 跳过 (-30💰)';

    document.getElementById('puHint').disabled = (state.items.hint <= 0 && state.coins < 20) || battleState.answered;
    document.getElementById('puSkip').disabled = state.coins < 30 || battleState.answered;
  }

  document.getElementById('puHint').addEventListener('click', function() {
    if (battleState.answered) return;
    if (state.items.hint > 0) {
      state.items.hint--;
    } else if (state.coins >= 20) {
      state.coins -= 20;
    } else {
      showToast('💰 金币不足！');
      return;
    }
    saveState();

    // Remove 2 wrong options
    var btns = document.getElementById('optionsGrid').querySelectorAll('.option-btn');
    var wrongIndices = [];
    btns.forEach(function(b, i) {
      if (i !== battleState.correctIdx) wrongIndices.push(i);
    });
    // Shuffle and pick 2
    wrongIndices.sort(function() { return Math.random() - .5; });
    var toHide = wrongIndices.slice(0, 2);
    toHide.forEach(function(i) {
      btns[i].style.opacity = '.2';
      btns[i].style.pointerEvents = 'none';
    });
    document.getElementById('questionHint').textContent = '💡 ' + (battleState.currentQuestion.hint || '');
    updatePowerupButtons();
    showToast('💡 已消除两个错误选项！');
  });

  document.getElementById('puSkip').addEventListener('click', function() {
    if (battleState.answered) return;
    if (state.coins < 30) {
      showToast('💰 金币不足！');
      return;
    }
    state.coins -= 30;
    saveState();
    battleState.answered = true;
    document.getElementById('battleLog').textContent = '⏭️ 跳过此题！';
    document.getElementById('battleLog').className = 'battle-log';
    updatePowerupButtons();
    setTimeout(function() { nextQuestion(); }, 600);
  });

  // ========== SKILL CARDS (P3) ==========
  function renderSkillCards() {
    if (!battleState || !battleState.drawnSkills) return;
    var tray = document.getElementById('skillTray');
    if (!tray) return;
    tray.innerHTML = '';
    battleState.drawnSkills.forEach(function(s, i) {
      var card = document.createElement('div');
      card.className = 'skill-card';
      if (battleState.skillUsed && battleState.activeSkill && battleState.activeSkill.skill.id === s.id) {
        card.classList.add('used');
      }
      card.innerHTML = '<span class="sk-icon">' + s.icon + '</span><span class="sk-name">' + s.name + '</span>';
      card.addEventListener('click', function() { useSkill(s); });
      tray.appendChild(card);
    });
  }

  function useSkill(skill) {
    if (!battleState || battleState.skillUsed || battleState.answered) return;
    battleState.skillUsed = true;
    battleState.activeSkill = { skill: skill, pending: true };

    if (skill.id === 'reroll') {
      // Immediate effect: replace wrong options
      battleState.activeSkill.pending = false;
      showToast(skill.icon + ' 洗牌！选项已更换！');
      // Re-render options from current question with new wrong options
      var q = battleState.currentQuestion;
      rerenderOptions(q);
    } else if (skill.id === 'quick_think') {
      // Immediate effect: show hint
      battleState.activeSkill.pending = false;
      document.getElementById('questionHint').textContent = '💡 ' + (battleState.currentQuestion.hint || '');
      showToast(skill.icon + ' 快速思考！提示已显示！');
    } else {
      // Delayed effects: precise, shield, gold_rain, time_stop
      battleState.skillEffect[skill.id] = true;
      showToast(skill.icon + ' ' + skill.name + '发动！');
    }
    renderSkillCards();
  }

  function rerenderOptions(q) {
    var indices = [0,1,2,3];
    for (var i = indices.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
    }
    battleState.optionMap = indices;
    battleState.correctIdx = indices.indexOf(q.ans);
    var grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';
    indices.forEach(function(origIdx) {
      var btn = document.createElement('button');
      btn.className = 'option-btn';
      var label = String.fromCharCode(65 + indices.indexOf(origIdx));
      btn.textContent = label + '. ' + q.opts[origIdx];
      btn.addEventListener('click', function() { selectAnswer(origIdx); });
      grid.appendChild(btn);
    });
  }

  function renderQuestionOptions(q, order) {
    if (!order) order = [0,1,2,3];
    battleState.optionMap = order;
    battleState.correctIdx = order.indexOf(q.ans);
    var grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';
    order.forEach(function(origIdx) {
      var btn = document.createElement('button');
      btn.className = 'option-btn';
      var label = String.fromCharCode(65 + order.indexOf(origIdx));
      btn.textContent = label + '. ' + q.opts[origIdx];
      btn.addEventListener('click', function() { selectAnswer(origIdx); });
      grid.appendChild(btn);
    });
    battleState.answered = false;
  }

  // ========== BOSS MECHANICS (P1) ==========
  function renderBossMechanic() {
    var el = document.getElementById('bossMechIndicator');
    if (!el) return;
    if (!battleState || !battleState.bossMechanic) {
      el.style.display = 'none';
      return;
    }
    el.style.display = 'block';
    var mech = battleState.bossMechanic;
    var phase = (mech.type === 'phase_shift' && mech.phases) ? mech.phases[battleState.bossPhase] : null;
    if (phase) {
      el.innerHTML = '<span class="bmi-badge">' + phase.name + '</span> ' + phase.desc;
    } else if (mech.type === 'mirror_shield') {
      var shieldActive = battleState.enemyHp > 0 && state.combo < mech.breakCombo;
      el.innerHTML = shieldActive ? ('<span class="bmi-badge active">盾</span> ' + mech.desc + ' [' + state.combo + '/' + mech.breakCombo + ']') : ('<span class="bmi-badge broken">盾破</span> 连击已突破！');
    } else if (mech.type === 'final_gate') {
      el.innerHTML = '<span class="bmi-badge">门</span> ' + mech.desc + ' [' + battleState.bossGateCount + '/' + mech.gateNeeded + ']';
    }
    el.style.display = 'block';
  }

  function checkBossPhase() {
    if (!battleState || !battleState.bossMechanic || battleState.bossMechanic.type !== 'phase_shift') return;
    var mech = battleState.bossMechanic;
    var phases = mech.phases;
    var hpPct = battleState.enemyHp / battleState.enemyMaxHp;
    // Check all phases in order
    for (var p = battleState.bossPhase; p < phases.length; p++) {
      if (hpPct <= phases[p].hpPct && battleState.bossPrevPhaseHp > battleState.enemyMaxHp * phases[p].hpPct) {
        battleState.bossPhase = p;
        showToast('⚠️ BOSS进入「' + phases[p].name + '」！');
        spawnParticles(window.innerWidth / 2, window.innerHeight / 2, '#a0522d');
        triggerShake();
        renderBossMechanic();
        break;
      }
    }
    battleState.bossPrevPhaseHp = battleState.enemyHp;
  }

  function applyBossDamageMod(dmg) {
    if (!battleState || !battleState.bossMechanic) return dmg;
    var mech = battleState.bossMechanic;
    if (mech.type === 'mirror_shield') {
      if (state.combo < mech.breakCombo) {
        dmg = Math.floor(dmg * (1 - mech.shieldPct));
      }
    }
    if (mech.type === 'final_gate') {
      battleState.bossGateCount++;
      if (battleState.bossGateCount >= mech.gateNeeded) {
        battleState.bossGateCount = 0;
        dmg = Math.floor(dmg * mech.damageBoost);
        showToast('🚪 终焉之门突破！伤害×' + mech.damageBoost + '！');
      } else {
        dmg = 0;
        showToast('🚪 门未开启 [' + battleState.bossGateCount + '/' + mech.gateNeeded + ']，伤害被阻挡！');
      }
    }
    if (mech.type === 'phase_shift') {
      var phase = mech.phases[battleState.bossPhase];
      if (phase && phase.dmgMult) dmg = Math.floor(dmg * phase.dmgMult);
    }
    return dmg;
  }

  function getBossPhaseQuestionFilter(q) {
    if (!battleState || !battleState.bossMechanic) return true;
    var mech = battleState.bossMechanic;
    if (mech.type === 'phase_shift') {
      var phase = mech.phases[battleState.bossPhase];
      if (phase && phase.labelFilter) {
        return phase.labelFilter.some(function(lb) {
          return q.label && q.label.indexOf(lb) >= 0;
        });
      }
    }
    return true;
  }

  function applyBossDamageToPlayer(baseDmg) {
    if (!battleState || !battleState.bossMechanic) return baseDmg;
    var mech = battleState.bossMechanic;
    if (mech.type === 'phase_shift') {
      var phase = mech.phases[battleState.bossPhase];
      if (phase && phase.dmgMult) return Math.floor(baseDmg * phase.dmgMult);
    }
    return baseDmg;
  }

  // ========== ROGUELIKE: ARTIFACT PICK ==========
  function showArtifactPick(hardBonus, callback) {
    var choices = pickArtifactChoices(hardBonus);
    var overlay = document.getElementById('artifactOverlay');
    var panel = document.getElementById('artifactPanel');
    overlay.style.display = 'flex';

    var html = '<h3>💎 选择遗物</h3><div class="ap-sub">选择一个遗物，效果持续本次冒险</div><div class="artifact-choices">';
    choices.forEach(function(a) {
      var rarityCls = a.rarity === 'legendary' ? 'legendary' : (a.rarity === 'rare' ? 'rare' : 'common');
      var rarityName = a.rarity === 'legendary' ? '传说' : (a.rarity === 'rare' ? '稀有' : '普通');
      html +=
        '<div class="artifact-choice" data-id="' + a.id + '">' +
          '<div class="ac-icon">' + a.icon + '</div>' +
          '<div class="ac-body">' +
            '<div class="ac-name">' + a.name + '</div>' +
            '<div class="ac-desc">' + a.desc + '</div>' +
            '<div class="ac-rarity ' + rarityCls + '">' + rarityName + '</div>' +
          '</div>' +
        '</div>';
    });
    html += '</div>';
    panel.innerHTML = html;

    // Bind click events
    var choiceEls = panel.querySelectorAll('.artifact-choice');
    choiceEls.forEach(function(el) {
      el.addEventListener('click', function() {
        var id = el.getAttribute('data-id');
        var artifact = ARTIFACTS.find(function(a) { return a.id === id; });
        if (artifact) {
          state.runArtifacts.push(artifact);
          saveState();
          showToast('💎 获得遗物：' + artifact.name + '！');
        }
        overlay.style.display = 'none';
        if (callback) callback();
      });
    });
  }

  // ========== TALENT TREE ==========
  function showTalent() {
    showScreen('talent');
    document.getElementById('talentCoins').textContent = state.coins;
    var totalTalents = 0;
    TALENTS.forEach(function(t) { totalTalents += getTalentLevel(t.id); });
    document.getElementById('talentSummary').textContent = '已升级 ' + totalTalents + ' 次';

    var grid = document.getElementById('talentGrid');
    grid.innerHTML = '';
    TALENTS.forEach(function(t) {
      var lv = getTalentLevel(t.id);
      var maxed = lv >= t.levels.length;
      var cost = maxed ? 'MAX' : '💰 ' + t.levels[lv];
      var canBuy = !maxed && state.coins >= t.levels[lv];

      var card = document.createElement('div');
      card.className = 'talent-card';
      if (maxed) card.classList.add('maxed');

      var dotsHtml = '';
      for (var d = 0; d < t.levels.length; d++) {
        dotsHtml += '<div class="t-dot' + (d < lv ? ' filled' : '') + '"></div>';
      }

      card.innerHTML =
        '<div class="t-icon" style="background:' + t.color + '">' + t.icon + '</div>' +
        '<div class="t-body">' +
          '<div class="t-name">' + t.name + ' Lv.' + lv + '/' + t.levels.length + '</div>' +
          '<div class="t-effect">' + (lv > 0 ? t.getEffect(lv) : t.desc) + '</div>' +
          '<div class="t-lvl">' + dotsHtml + '</div>' +
        '</div>' +
        '<div class="t-action">' +
          '<button class="btn btn-xs ' + (canBuy ? 'btn-primary' : 'btn-secondary') + '" ' + (!canBuy ? 'disabled' : '') + '>' + cost + '</button>' +
        '</div>';

      if (canBuy) {
        card.querySelector('button').addEventListener('click', function() {
          if (state.coins >= t.levels[lv]) {
            state.coins -= t.levels[lv];
            state.talents[t.id] = lv + 1;
            saveState();
            showToast('⭐ ' + t.name + ' 升级到 Lv.' + (lv + 1) + '！');
            showTalent();
          }
        });
      }

      grid.appendChild(card);
    });
  }

  // ========== MAP: add talent button ==========
  // Override showMap to add talent button indicator
  var _origShowMap = showMap;
  var reviewFilterWorld = 'all';

  function showReview() {
    showScreen('review');
    renderReviewFilters();
    renderReviewList();
  }

  function renderReviewFilters() {
    var container = document.getElementById('reviewFilters');
    var chips = [{ id: 'all', label: '全部' }];
    WORLDS.forEach(function(w) {
      chips.push({ id: w.id, label: w.icon + ' ' + w.name });
    });

    container.innerHTML = '';
    chips.forEach(function(c) {
      var chip = document.createElement('div');
      chip.className = 'review-filter-chip';
      if (reviewFilterWorld === c.id) chip.classList.add('active');
      chip.textContent = c.label;
      chip.addEventListener('click', function() {
        reviewFilterWorld = c.id;
        renderReviewFilters();
        renderReviewList();
      });
      container.appendChild(chip);
    });
  }

  function renderReviewList() {
    var list = document.getElementById('reviewList');
    var countEl = document.getElementById('reviewCount');
    var filtered = state.wrongAnswers;
    var btnChallenge = document.getElementById('btnChallengeWrong');

    if (reviewFilterWorld !== 'all') {
      filtered = state.wrongAnswers.filter(function(wa) {
        return wa.worldId === reviewFilterWorld;
      });
    }

    countEl.textContent = filtered.length + ' 题';
    btnChallenge.style.display = filtered.length > 0 ? '' : 'none';

    if (filtered.length === 0) {
      list.innerHTML =
        '<div class="review-empty">' +
        '<div class="rv-empty-icon">🎉</div>' +
        '<div>还没有错题，继续保持！</div>' +
        '</div>';
      return;
    }

    list.innerHTML = '';
    // Show most recent first
    var items = filtered.slice().reverse();
    items.forEach(function(wa) {
      var world = WORLDS.find(function(w) { return w.id === wa.worldId; });
      var q = QUESTIONS[wa.worldId][wa.questionIdx];
      if (!q) return;

      var card = document.createElement('div');
      card.className = 'review-card';
      card.innerHTML =
        '<div class="rv-label" style="color:' + (world ? world.color : 'inherit') + '">' +
          (world ? world.icon : '') + ' ' + (world ? world.name : '') + ' · ' + (q.label || '') +
        '</div>' +
        '<div class="rv-question">' + q.q + '</div>' +
        '<div class="rv-wrong">✗ 你的错误选择（正确答案是 <b>' + q.opts[q.ans] + '</b>）</div>' +
        '<div class="rv-hint">💡 ' + (q.hint || '无提示') + '</div>';
      list.appendChild(card);
    });
  }

  // Challenge wrong answers: create a custom battle
  function challengeWrongAnswers() {
    var pool = state.wrongAnswers;
    if (reviewFilterWorld !== 'all') {
      pool = pool.filter(function(wa) { return wa.worldId === reviewFilterWorld; });
    }
    if (pool.length === 0) {
      showToast('📖 当前没有错题可挑战！');
      return;
    }
    if (state.playerHp <= 0) {
      showToast('❤️ HP不足，请先购买回复药水！');
      return;
    }

    // Pick a random world from wrong answers as arena
    var worldId = pool[0].worldId;
    var world = WORLDS.find(function(w) { return w.id === worldId; });
    var questionCount = Math.min(pool.length, 8);

    // Create a virtual stage
    var virtualStage = {
      id: 'review_challenge',
      name: '错题挑战',
      ename: '记忆幽灵',
      eicon: '👻',
      hp: 60 + questionCount * 15,
      damage: 12,
      questions: questionCount,
      boss: false,
      isReview: true,
      reviewPool: pool
    };

    state.currentWorld = worldId;
    showMap = showMap; // preserve
    startReviewBattle(world, virtualStage);
  }

  function startReviewBattle(world, stage) {
    showScreen('battle');
    document.getElementById('battleStageName').textContent = '📖 错题挑战 · ' + stage.name;
    document.getElementById('battleScore').textContent = state.score;
    document.getElementById('battleScreen').classList.remove('boss-fight');

    battleState = {
      world: world,
      stage: stage,
      enemyHp: stage.hp,
      enemyMaxHp: stage.hp,
      questionCount: 0,
      totalQuestions: stage.questions,
      correctInStage: 0,
      answered: false,
      currentQuestion: null,
      usedInStage: [],
      isReview: true,
      reviewQueue: stage.reviewPool.slice()
    };

    document.getElementById('enemySprite').textContent = stage.eicon;
    document.getElementById('enemySprite').classList.remove('hit');
    document.getElementById('enemyName').textContent = stage.ename;
    document.getElementById('enemyHpFill').style.width = '100%';
    document.getElementById('enemyHpText').textContent = battleState.enemyHp + '/' + battleState.enemyMaxHp;
    document.getElementById('battleLog').textContent = '';
    document.getElementById('battleLog').className = 'battle-log';
    document.getElementById('playerHpFill').style.width = (state.playerHp / state.maxHp * 100) + '%';
    document.getElementById('playerHpText').textContent = state.playerHp + '/' + state.maxHp;
    document.getElementById('comboCount').textContent = state.combo;
    document.getElementById('questionHint').textContent = '';
    updatePowerupButtons();
    nextQuestionReview();
  }

  function nextQuestionReview() {
    if (battleState.questionCount >= battleState.totalQuestions) {
      winStage();
      return;
    }
    if (state.playerHp <= 0) {
      loseStage();
      return;
    }

    battleState.answered = false;
    var options = document.getElementById('optionsGrid').querySelectorAll('.option-btn');
    options.forEach(function(o) { o.className = 'option-btn'; });

    // Pick from review queue
    var wa = battleState.reviewQueue.shift();
    var q = QUESTIONS[wa.worldId][wa.questionIdx];
    battleState.currentQuestion = q;
    battleState.currentWorldId = wa.worldId;
    battleState.questionCount++;

    document.getElementById('questionLabel').textContent = '📖 错题回顾 · ' + (q.label || '');
    document.getElementById('questionText').textContent = q.q;
    document.getElementById('questionHint').textContent = '';
    document.getElementById('battleLog').textContent = '第 ' + battleState.questionCount + '/' + battleState.totalQuestions + ' 题（错题挑战）';
    document.getElementById('battleLog').className = 'battle-log';

    // Shuffle options
    var indices = [0, 1, 2, 3];
    for (var i = indices.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = indices[i]; indices[i] = indices[j]; indices[j] = tmp;
    }
    battleState.optionMap = indices;
    battleState.correctIdx = indices.indexOf(q.ans);

    var grid = document.getElementById('optionsGrid');
    grid.innerHTML = '';
    indices.forEach(function(origIdx) {
      var btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = q.opts[origIdx];
      btn.addEventListener('click', function() { selectAnswer(origIdx, btn); });
      grid.appendChild(btn);
    });
  }

  // Override nextQuestion for review battles
  var _origNextQuestion = nextQuestion;
  // Patch: in selectAnswer, after correct/wrong handling, use appropriate next
  var _origSelectAnswer = selectAnswer;

  // Clear wrong answers
  function clearWrongAnswers() {
    if (confirm('确定清空所有错题记录吗？此操作不可撤销。')) {
      state.wrongAnswers = [];
      saveState();
      renderReviewList();
      showToast('🗑️ 错题记录已清空！');
    }
  }

  // ========== SHOP SCREEN ==========
  var shopItems = [
    { id: 'hint', name: '提示卷轴', desc: '消除两个错误选项', cost: 40, icon: '📜' },
    { id: 'heal', name: '回复药水', desc: '恢复40点HP（战斗中不可用）', cost: 60, icon: '🧪' },
    { id: 'critical', name: '必杀符咒', desc: '下一题必定暴击（2倍伤害）', cost: 80, icon: '⚡' }
  ];

  function showShop() {
    showScreen('shop');
    document.getElementById('shopCoins').textContent = state.coins;
    document.getElementById('btnShopBack').onclick = function() { showMap(); };
    var list = document.getElementById('shopItems');
    list.innerHTML = '';
    shopItems.forEach(function(item) {
      var div = document.createElement('div');
      div.className = 'shop-item';
      div.innerHTML =
        '<div class="shop-item-icon">' + item.icon + '</div>' +
        '<div class="shop-item-body">' +
          '<div class="shop-item-name">' + item.name + ' (已有: ' + (state.items[item.id] || 0) + ')</div>' +
          '<div class="shop-item-desc">' + item.desc + '</div>' +
        '</div>' +
        '<div class="shop-item-cost">💰 ' + item.cost + '</div>';
      div.addEventListener('click', function() {
        if (state.coins >= item.cost) {
          state.coins -= item.cost;
          state.items[item.id] = (state.items[item.id] || 0) + 1;
          saveState();
          showToast('✅ 购买了 ' + item.name + '！');
          showShop();
        } else {
          showToast('💰 金币不足！');
        }
      });
      list.appendChild(div);
    });
  }

  document.getElementById('btnShop').addEventListener('click', showShop);
  document.getElementById('btnReview').addEventListener('click', showReview);
  document.getElementById('btnReviewBack').addEventListener('click', showMap);
  document.getElementById('btnTalent').addEventListener('click', showTalent);
  document.getElementById('btnChallengeWrong').addEventListener('click', challengeWrongAnswers);
  document.getElementById('btnClearWrong').addEventListener('click', clearWrongAnswers);
  document.getElementById('btnTalentBack').addEventListener('click', showMap);
  document.getElementById('btnPathBack').addEventListener('click', function() {
    state.runArtifacts = [];
    state.runPath = null;
    saveState();
    showMap();
  });

  // ========== INIT ==========
  initTitle();
})();
</script>
